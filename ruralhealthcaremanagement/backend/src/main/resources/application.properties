spring.application.name=management-system

# H2 In-Memory Database (no MySQL setup needed)
spring.datasource.url=jdbc:h2:mem:rural_healthcare;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (accessible at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html

# Security
rhms.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
rhms.jwt.expiration=86400000
